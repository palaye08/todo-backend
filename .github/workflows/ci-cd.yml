# CI/CD pipeline for todo-backend
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#   DOCKER_USERNAME      - Docker Hub username (e.g. palaye769)
#   DOCKER_PASSWORD      - Docker Hub access token / password
#   EC2_HOST             - Public IP or DNS of the Front AWS instance (SSH bastion)
#   EC2_USER             - SSH user on the Front instance (e.g. ec2-user)
#   SSH_PRIVATE_KEY      - Private SSH key with access to Front and, via ProxyJump, Back
#   BACK_PRIVATE_IP      - Private IP of the Back AWS instance
#   DB_PRIVATE_IP        - Private IP of the DB AWS instance
#   MYSQL_ROOT_PASSWORD  - MySQL root password used by the backend to connect to the DB
#   MYSQL_DATABASE       - MySQL database name (todo_db)
#
# Trigger: push on main
# Job 1 (build-and-push): builds the Docker image and pushes it to
#   palaye769/todo-backend on Docker Hub, tagged "latest" and with the
#   commit SHA.
# Job 2 (deploy): SSHes into the Front instance (public, bastion), then runs
#   a script that connects directly from Front to the private Back instance
#   (Front is already inside the VPC, so no extra proxy hop is needed there)
#   to pull the new image and restart the todo-backend container.

name: CI/CD - todo-backend

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (latest)
        run: docker build -t palaye769/todo-backend:latest .

      - name: Build Docker image (commit SHA)
        run: docker build -t palaye769/todo-backend:${{ github.sha }} .

      - name: Push Docker image (latest)
        run: docker push palaye769/todo-backend:latest

      - name: Push Docker image (commit SHA)
        run: docker push palaye769/todo-backend:${{ github.sha }}

  deploy:
    name: Deploy to AWS Back instance (via Front bastion)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (cascade through Front to Back)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/key.pem
            chmod 600 /tmp/key.pem
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                -i /tmp/key.pem \
                ${{ secrets.EC2_USER }}@${{ secrets.BACK_PRIVATE_IP }} \
                "docker pull palaye769/todo-backend:latest && \
                 docker stop todo-backend 2>/dev/null || true && \
                 docker rm todo-backend 2>/dev/null || true && \
                 docker run -d --name todo-backend -p 8080:8080 \
                   -e SPRING_DATASOURCE_URL='jdbc:mysql://${{ secrets.DB_PRIVATE_IP }}:3306/${{ secrets.MYSQL_DATABASE }}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true' \
                   -e SPRING_DATASOURCE_USERNAME=root \
                   -e SPRING_DATASOURCE_PASSWORD='${{ secrets.MYSQL_ROOT_PASSWORD }}' \
                   --restart always \
                   palaye769/todo-backend:latest"
