---
# Rôle "db" : déploiement du conteneur MySQL.
# Utilise community.docker.docker_container (idempotent).

- name: Récupérer l'image mysql:8.0
  community.docker.docker_image:
    name: "mysql:8.0"
    source: pull
    force_source: true
  become: true

- name: Arrêter et supprimer un éventuel conteneur MySQL existant
  community.docker.docker_container:
    name: todo-mysql
    state: absent
    force_kill: true
  become: true
  ignore_errors: true

- name: Lancer le conteneur MySQL
  community.docker.docker_container:
    name: todo-mysql
    image: "mysql:8.0"
    state: started
    restart_policy: always
    published_ports:
      - "{{ mysql_port }}:3306"
    env:
      MYSQL_ROOT_PASSWORD: "{{ mysql_root_password }}"
      MYSQL_DATABASE: "{{ mysql_database }}"
    volumes:
      - "mysql_data:/var/lib/mysql"
  become: true

