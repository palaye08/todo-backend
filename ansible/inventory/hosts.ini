# Inventaire Ansible - à compléter avec les IP réelles fournies par
# les outputs Terraform (terraform output) après `terraform apply`.
#
# Exemple (valeurs fictives, à remplacer) :
#   front_public_ip = 15.237.12.34
#   back_private_ip = 10.0.2.10
#   db_private_ip   = 10.0.2.20

[front]
FRONT_PUBLIC_IP

[back]
BACK_PRIVATE_IP ansible_ssh_common_args='-o ProxyJump=ec2-user@FRONT_PUBLIC_IP'

[db]
DB_PRIVATE_IP ansible_ssh_common_args='-o ProxyJump=ec2-user@FRONT_PUBLIC_IP'

[all:vars]
ansible_user                 = ec2-user
ansible_ssh_private_key_file = ~/.ssh/id_rsa
