# =========================================================
# Todo Backend - configuration principale
# Toutes les valeurs sont surchargeables via variables d'env
# (utilisé par docker-compose, Ansible et GitHub Actions CI/CD)
# =========================================================

spring.application.name=todo-backend

# --- Datasource ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/todo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:passer123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- JWT ---
jwt.secret=${JWT_SECRET:todo_secret_key_very_long_and_secure_2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
